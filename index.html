<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- iOS Web App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="作詞連想">
    
    <title>ナルキ式・作詞連想ツール v7.4</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; padding: 15px; background: #121212; color: #e0e0e0; margin: 0; line-height: 1.6; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); border: 1px solid #333; box-sizing: border-box; }
        h3 { border-bottom: 2px solid #00d1b2; padding-bottom: 10px; color: #00d1b2; margin-top: 0; margin-bottom: 20px; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; }
        
        /* エラー警告用 */
        #storageWarning { background: #ff4757; color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.8em; display: none; text-align: center; }

        .file-panel { background: #161b22; padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .file-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        .action-btn { 
            appearance: none; -webkit-appearance: none;
            background: #30363d; border: 1px solid #444; color: #c9d1d9; padding: 10px; border-radius: 8px; 
            cursor: pointer; transition: 0.2s; font-size: 0.8em; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .action-btn:active { background: #444; transform: scale(0.98); }
        .export-btn { border-color: #00d1b2; color: #00d1b2; }
        
        .ai-panel { background: linear-gradient(145deg, #2c3e50, #000000); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #9b59b6; }
        .ai-results { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .ai-chip { background: rgba(155, 89, 182, 0.2); border: 1px solid #9b59b6; color: #efbfff; padding: 6px 12px; border-radius: 20px; font-size: 0.8em; cursor: pointer; }

        .input-group { background: #252a2e; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #00d1b2; }
        input { width: 100%; padding: 14px 12px; border-radius: 8px; border: 1px solid #444; background: #2c3e50; color: white; font-size: 16px; outline: none; box-sizing: border-box; margin: 8px 0; }
        
        .toggle-sync-btn { width: 100%; background: #333; border: 1px solid #555; color: #888; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 0.85em; margin: 5px 0; display: block; text-align: center; }
        .toggle-sync-btn.active { border-color: #00d1b2; color: #00d1b2; background: rgba(0,209,178,0.1); }
        
        .add-btn { width: 100%; background: #00d1b2; color: #121212; padding: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1rem; margin-top: 10px; }
        .gemini-btn { width: 100%; background: #9b59b6; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9em; margin-top: 8px; }

        .search-box { position: sticky; top: 0; background: #1e1e1e; padding: 15px 0; z-index: 10; border-bottom: 1px solid #333; }
        .result-item { background: #262626; padding: 15px; margin-bottom: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: flex-start; border: 1px solid #333; }
        .vowel { color: #e17055; font-weight: bold; font-size: 1.2em; text-align: right; }
        .delete-btn { background: none; border: 1px solid #ff4757; color: #ff4757; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.8em; margin-top: 10px; }
        
        textarea#importArea { width: 100%; height: 100px; background: #000; color: #0f0; font-family: monospace; font-size: 12px; margin-top: 10px; border-radius: 5px; padding: 10px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="container">
        <div id="storageWarning">⚠️ データの保存機能がオフになっています。Safariで開き直し、「ホーム画面に追加」を行ってください。</div>
        
        <h3>
            <span>作詞連想ツール v7.4</span>
            <span style="font-size: 0.5em; color: #888;">iPhone安定版</span>
        </h3>

        <div class="file-panel">
            <div class="file-actions">
                <button class="action-btn export-btn" onclick="exportToFile()">💾 保存(DL)</button>
                <label class="action-btn">📂 読み込み<input type="file" id="importInput" style="display: none;" accept=".json" onchange="importFromFile(event)"></label>
            </div>
            <button class="action-btn" style="width: 100%; margin-top: 8px; font-size: 0.75em;" onclick="toggleImportArea()">📋 データを直接貼り付けて読み込む</button>
            <div id="importAreaContainer" style="display:none;">
                <textarea id="importArea" placeholder="ここにバックアップテキストを貼り付け"></textarea>
                <button class="action-btn" style="width: 100%; background: #238636; color: white; margin-top: 5px;" onclick="importFromText()">インポート実行</button>
            </div>
        </div>

        <div class="ai-panel">
            <div style="font-size: 0.8em; color: #bbb;">✨ AI 作詞アシスタント</div>
            <div id="aiLoading" style="display:none; text-align:center; font-size:0.8em; padding:10px;">AIが連想中...</div>
            <div id="aiResults" class="ai-results"></div>
        </div>
        
        <div class="input-group">
            <input type="text" id="newName" placeholder="言葉（例：情熱）" autocomplete="off">
            <button id="syncToggleBtn" class="toggle-sync-btn active" onclick="toggleSync()">🔗 表示名と読みを連動中 (Ctrl+/)</button>
            <input type="text" id="newRuby" placeholder="読み（例：じょうねつ）" autocomplete="off">
            
            <div style="display:flex; justify-content: space-between; font-size: 0.9em; padding: 8px 5px;">
                <span>母音: <span id="vowelPreview" style="color:#e17055; font-weight:bold;">-</span></span>
                <span>文字数: <span id="lenPreview" style="color:#00d1b2;">0</span>音</span>
            </div>
            
            <button class="add-btn" onclick="addWord()">端末に貯金する</button>
            <button class="gemini-btn" onclick="askGeminiForWords()">✨ AIに関連ワードを聞く</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="母音・言葉・文字数で検索" oninput="search()">
        </div>
        <div id="results"></div>
    </div>

    <script>
        const apiKey = "AIzaSyAAZ5zBLQ194QE10bg8iYZadB5dWVUnzpo";
        let lyricsBank = [];
        let isSyncing = true;

        // 初期化処理
        window.onload = () => {
            checkStorage();
            loadBank();
            setupInputSync();
            search();
        };

        // ストレージが使えるかチェック（iPhoneのプレビューモード対策）
        function checkStorage() {
            try {
                localStorage.setItem('test', '1');
                localStorage.removeItem('test');
            } catch (e) {
                document.getElementById('storageWarning').style.display = 'block';
            }
        }

        function loadBank() {
            const saved = localStorage.getItem('sakushi_lyrics_bank');
            if (saved) {
                try {
                    lyricsBank = JSON.parse(saved);
                } catch (e) {
                    lyricsBank = [];
                }
            }
        }

        // 入力同期ロジック (iPhoneの予測変換に強い実装)
        function setupInputSync() {
            const nameInput = document.getElementById('newName');
            const rubyInput = document.getElementById('newRuby');

            const syncHandler = () => {
                if (isSyncing) {
                    rubyInput.value = nameInput.value;
                }
                updatePreviews();
            };

            // inputイベントだけでなく、組成イベントも監視
            nameInput.addEventListener('input', syncHandler);
            nameInput.addEventListener('compositionupdate', syncHandler);
            nameInput.addEventListener('compositionend', syncHandler);
            
            rubyInput.addEventListener('input', updatePreviews);
        }

        function toggleSync() {
            isSyncing = !isSyncing;
            const btn = document.getElementById('syncToggleBtn');
            btn.classList.toggle('active', isSyncing);
            btn.innerText = isSyncing ? "🔗 表示名と読みを連動中 (Ctrl+/)" : "🔓 読みを独立入力中 (Ctrl+/)";
        }

        // ショートカット
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === '/' || e.keyCode === 191)) {
                e.preventDefault();
                toggleSync();
            }
        });

        // 読みの解析
        function hiraToKata(s) { return s.replace(/[ぁ-ん]/g, m => String.fromCharCode(m.charCodeAt(0) + 0x60)); }
        function extractVowels(s) {
            const k = hiraToKata(s);
            const vt = {'ア':'ア','カ':'ア','サ':'ア','タ':'ア','ナ':'ア','ハ':'ア','マ':'ア','ヤ':'ア','ラ':'ア','ワ':'ア','ガ':'ア','ザ':'ア','ダ':'ア','バ':'ア','パ':'ア','ァ':'ア','ャ':'ア','イ':'イ','キ':'イ','シ':'イ','チ':'イ','ニ':'イ','ヒ':'イ','ミ':'イ','リ':'イ','ギ':'イ','ジ':'イ','ヂ':'イ','ビ':'イ','ピ':'イ','ィ':'イ','ウ':'ウ','ク':'ウ','ス':'ウ','ツ':'ウ','ヌ':'ウ','フ':'ウ','ム':'ウ','ユ':'ユ','ル':'ウ','グ':'ウ','ズ':'ウ','ブ':'ウ','プ':'ウ','ゥ':'ウ','ュ':'ウ','エ':'エ','ケ':'エ','セ':'エ','テ':'エ','ネ':'エ','ヘ':'エ','メ':'エ','レ':'エ','ゲ':'エ','ゼ':'エ','デ':'エ','ベ':'エ','ペ':'エ','ェ':'エ','オ':'オ','コ':'オ','ソ':'オ','ト':'オ','ノ':'オ','ホ':'オ','モ':'オ','ヨ':'オ','ロ':'オ','ヲ':'オ','ゴ':'オ','ゾ':'オ','ド':'オ','ボ':'オ','ポ':'オ','ォ':'オ','ョ':'オ','ン':'ン'};
            let r = ""; for(let c of k) if(vt[c]) r += vt[c];
            return Array.from(new Set(r.split(''))).join('');
        }

        function updatePreviews() {
            const rb = document.getElementById('newRuby').value;
            document.getElementById('vowelPreview').innerText = extractVowels(rb) || "-";
            document.getElementById('lenPreview').innerText = rb.length;
        }

        function addWord() {
            const n = document.getElementById('newName').value.trim();
            const r = document.getElementById('newRuby').value.trim();
            if(!n || !r) return;
            
            lyricsBank.push({ name: n, ruby: r, vowels: extractVowels(r), len: r.length });
            saveToStorage();
            
            document.getElementById('newName').value = '';
            document.getElementById('newRuby').value = '';
            updatePreviews();
            search();
        }

        function saveToStorage() {
            try {
                localStorage.setItem('sakushi_lyrics_bank', JSON.stringify(lyricsBank));
            } catch (e) {
                alert("保存に失敗しました。Safariで開いていますか？");
            }
        }

        function deleteWord(i) {
            if(confirm("この言葉を貯金箱から削除しますか？")) {
                lyricsBank.splice(i, 1);
                saveToStorage();
                search();
            }
        }

        function search() {
            const q = document.getElementById('searchInput').value;
            const rd = document.getElementById('results');
            rd.innerHTML = '';
            
            const filtered = lyricsBank.map((w, i) => ({...w, i}))
                .filter(w => w.name.includes(q) || w.ruby.includes(q) || w.vowels.includes(hiraToKata(q)) || (q.match(/^\d+/) && w.len == parseInt(q)));
            
            filtered.sort((a,b) => a.len - b.len).forEach(w => {
                const d = document.createElement('div'); d.className = 'result-item';
                d.innerHTML = `
                    <div>
                        <b>${w.name}</b> (${w.len}音)<br>
                        <small style="color:#888">${w.ruby}</small><br>
                        <button class="delete-btn" onclick="deleteWord(${w.i})">削除</button>
                    </div>
                    <div class="vowel">${w.vowels}</div>
                `;
                rd.appendChild(d);
            });
        }

        // インポート・エクスポート
        function toggleImportArea() {
            const container = document.getElementById('importAreaContainer');
            container.style.display = container.style.display === 'none' ? 'block' : 'none';
        }

        function importFromText() {
            const val = document.getElementById('importArea').value;
            if(!val) return;
            try {
                const json = JSON.parse(val);
                if(Array.isArray(json)) {
                    lyricsBank = [...lyricsBank, ...json];
                    saveToStorage();
                    search();
                    alert("インポートしました");
                    toggleImportArea();
                }
            } catch(e) { alert("形式が正しくありません"); }
        }

        function importFromFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const json = JSON.parse(ev.target.result);
                    lyricsBank = [...lyricsBank, ...json];
                    saveToStorage();
                    search();
                    alert("ファイルを読み込みました");
                } catch(err) { alert("失敗しました"); }
            };
            reader.readAsText(file);
        }

        function exportToFile() {
            const blob = new Blob([JSON.stringify(lyricsBank, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'lyrics_data.json';
            a.click();
        }

        // AI機能
        async function askGeminiForWords() {
            const kw = document.getElementById('newName').value.trim();
            if (!kw) return;
            const load = document.getElementById('aiLoading');
            const res = document.getElementById('aiResults');
            load.style.display = "block"; res.innerHTML = "";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `${kw}から連想される、作詞で使えるエモーショナルな言葉を10個。形式: { "suggestions": [{ "name": "言葉", "ruby": "かな" }] }` }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const data = await response.json();
                const json = JSON.parse(data.candidates[0].content.parts[0].text);
                load.style.display = "none";
                json.suggestions.forEach(item => {
                    const chip = document.createElement('span'); chip.className = 'ai-chip'; chip.innerText = item.name;
                    chip.onclick = () => {
                        document.getElementById('newName').value = item.name;
                        document.getElementById('newRuby').value = item.ruby;
                        updatePreviews();
                    };
                    res.appendChild(chip);
                });
            } catch (e) { load.style.display = "none"; alert("AIとの接続に失敗しました"); }
        }
    </script>
</body>
</html>
