<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>作詞連想ツール v8.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 bg-gray-50 text-gray-900">

    <script>
        // 【重要】ここに Google AI Studio で取得した API キーを貼り付けてください
        const apiKey = "AIzaSyAdVcjdm8wy2PASetFTpstwx1b0jEuIRUM"; 
    </script>

    <div class="max-w-md mx-auto space-y-4">
        <!-- ヘッダー -->
        <div class="bg-white p-6 rounded-2xl shadow-sm text-center">
            <h1 class="text-2xl font-bold text-gray-800">作詞連想ツール v8.5</h1>
            <p class="text-xs text-gray-400 mt-1">AI 接続診断モード</p>
        </div>

        <!-- 入力エリア -->
        <div class="bg-white p-6 rounded-2xl shadow-sm space-y-4 border border-gray-100">
            <div>
                <label class="block text-xs font-bold text-gray-400 mb-1 ml-1">言葉を入力</label>
                <input type="text" id="displayInput" class="w-full p-4 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-purple-400 outline-none transition-all" placeholder="例：蒼い空">
            </div>
            
            <div class="flex space-x-2">
                <button onclick="saveWord()" class="flex-1 bg-blue-500 text-white py-4 font-bold rounded-xl active:scale-95 transition-all shadow-md shadow-blue-100">貯金する</button>
                <button onclick="askAI()" class="bg-purple-600 text-white px-8 py-4 font-bold rounded-xl active:scale-95 transition-all flex items-center justify-center shadow-md shadow-purple-100">
                    <span id="aiButtonText">AI提案</span>
                    <div id="spinner" class="hidden animate-spin border-2 border-white border-t-transparent rounded-full w-5 h-5"></div>
                </button>
            </div>
        </div>

        <!-- AI 回答・診断エリア -->
        <div class="bg-purple-50 p-5 rounded-2xl border border-purple-100 min-h-[120px] transition-all">
            <h2 class="text-xs font-bold text-purple-400 mb-2 uppercase tracking-widest">AI Response / Diagnosis</h2>
            <p id="aiResponse" class="text-gray-700 text-sm whitespace-pre-wrap font-medium leading-relaxed">AIボタンを押すと、ここに結果またはエラーの詳細が表示されます。</p>
        </div>
        
        <!-- リスト表示エリア -->
        <div id="listSection" class="space-y-2"></div>
    </div>

    <script>
        let words = JSON.parse(localStorage.getItem('sakushi_words') || '[]');

        function saveWord() {
            const val = document.getElementById('displayInput').value.trim();
            if (!val) return;
            words.unshift({ display: val, yomi: val, date: new Date().getTime() });
            localStorage.setItem('sakushi_words', JSON.stringify(words));
            document.getElementById('displayInput').value = '';
            renderList();
        }

        function renderList() {
            document.getElementById('listSection').innerHTML = words.map((w, i) => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-50 flex justify-between items-center animate-in fade-in slide-in-from-bottom-2">
                    <div class="font-bold text-gray-700 text-lg">${w.display}</div>
                    <button onclick="deleteWord(${i})" class="text-red-200 hover:text-red-400 p-2 transition-colors text-xl">✕</button>
                </div>
            `).join('');
        }

        function deleteWord(index) {
            words.splice(index, 1);
            localStorage.setItem('sakushi_words', JSON.stringify(words));
            renderList();
        }

        async function askAI() {
            const val = document.getElementById('displayInput').value.trim();
            if (!val) {
                alert("言葉を入力してください");
                return;
            }
            if (!apiKey || apiKey === "") {
                alert("APIキーが設定されていません。index.htmlの13行目を確認してください。");
                return;
            }

            const resArea = document.getElementById('aiResponse');
            const btnText = document.getElementById('aiButtonText');
            const spinner = document.getElementById('spinner');

            btnText.classList.add('hidden');
            spinner.classList.remove('hidden');
            resArea.innerText = "Google AI Studio に接続中...";
            resArea.classList.remove('text-red-500');

            try {
const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + apiKey;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: `あなたはプロの作詞家です。「${val}」という言葉から連想される、エモーショナルな歌詞フレーズを5つ提案してください。` }]
                        }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    resArea.classList.add('text-red-500');
                    resArea.innerText = "【Google API エラー診断】\n\n" + 
                                      "Code: " + data.error.code + "\n" +
                                      "Status: " + data.error.status + "\n" +
                                      "Message: " + data.error.message;
                } 
                else if (data.candidates && data.candidates[0].content) {
                    resArea.innerText = data.candidates[0].content.parts[0].text;
                } 
                else {
                    resArea.innerText = "AIからの返答が解析できませんでした。\n" + JSON.stringify(data);
                }

            } catch (e) {
                resArea.classList.add('text-red-500');
                resArea.innerText = "【ネットワーク接続エラー】\n" + e.message;
            } finally {
                btnText.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        }

        renderList();
    </script>
</body>
</html>
