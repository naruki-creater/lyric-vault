<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ナルキ式・作詞連想ツール v8.0</title>
    <style>
        /* 3. 視覚デザイン: ダークモードUI基調  */
        body { 
            font-family: sans-serif; 
            background: #121212; 
            color: #e0e0e0; 
            margin: 0; 
            padding: 15px;
            line-height: 1.6;
        }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* アクセントカラー: #00d1b2  */
        h2 { color: #00d1b2; border-bottom: 2px solid #00d1b2; padding-bottom: 10px; }

        /* 2. 入力支援: 入力グループ  */
        .input-group { 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 12px; 
            border-left: 5px solid #00d1b2;
            margin-bottom: 20px;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #2c3e50; 
            color: white; 
            font-size: 16px;
            box-sizing: border-box;
        }
        
        .sync-btn {
            width: 100%;
            background: #333;
            color: #888;
            border: 1px solid #555;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8em;
            margin-bottom: 10px;
        }
        .sync-btn.active { color: #00d1b2; border-color: #00d1b2; }

        /* 入力プレビュー: 母音と音数の表示  */
        .preview-area { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.9em; 
            margin: 10px 0;
            padding: 0 5px;
        }
        .vowel-val { color: #e17055; font-weight: bold; } /* オレンジ  */
        .count-val { color: #00d1b2; font-weight: bold; }

        .add-btn { 
            width: 100%; 
            background: #00d1b2; 
            color: #121212; 
            padding: 15px; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 1.1em;
            cursor: pointer;
        }

        /* 3. スティッキー検索バー  */
        .search-box { 
            position: sticky; 
            top: 0; 
            background: #121212; 
            padding: 15px 0; 
            z-index: 100;
        }

        /* 4. データ管理: リスト表示  */
        .result-item { 
            background: #252a2e; 
            padding: 15px; 
            margin-bottom: 10px; 
            border-radius: 10px; 
            display: flex; 
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
        }
        .word-info b { font-size: 1.2em; }
        .word-info small { color: #aaa; display: block; }
        
        /* 音数バッジ  */
        .badge {
            background: #333;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7em;
            color: #00d1b2;
            margin-left: 5px;
        }

        .delete-btn {
            background: transparent;
            color: #ff4757;
            border: 1px solid #ff4757;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
        }

        .file-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .file-btn {
            flex: 1;
            padding: 10px;
            background: #30363d;
            color: white;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 0.8em;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>RHYME STUDIO v8.0</h2>

    <div class="file-actions">
        <button class="file-btn" onclick="exportData()">💾 保存(DL)</button>
        <button class="file-btn" onclick="document.getElementById('fileIn').click()">📂 読込</button>
        <input type="file" id="fileIn" style="display:none" onchange="importData(event)">
    </div>

    <div class="input-group">
        <input type="text" id="newName" placeholder="表示名 (例: 情熱)" autocomplete="off">
        <button id="syncBtn" class="sync-btn active" onclick="toggleSync()">🔗 表示名と読みを連動中</button>
        <input type="text" id="newRuby" placeholder="読み (例: じょうねつ)" autocomplete="off">
        
        <div class="preview-area">
            <span>母音: <span id="vPreview" class="vowel-val">-</span></span>
            <span>音数: <span id="cPreview" class="count-val">0</span>音</span>
        </div>
        
        <button class="add-btn" onclick="addWord()">端末に貯金する</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchIn" placeholder="母音・言葉・音数で検索" oninput="runSearch()">
    </div>

    <div id="resultList"></div>
</div>

<script>
    // 4. データ管理: ローカル保存 
    let bank = JSON.parse(localStorage.getItem('naruki_lyrics_v8')) || [];
    let isSyncing = true;

    // 1. リアルタイム母音抽出ロジック 
    function getVowels(str) {
        if (!str) return "";
        const kana = str.replace(/[ぁ-ん]/g, s => String.fromCharCode(s.charCodeAt(0) + 0x60));
        const table = {
            'ア':'ア','カ':'ア','サ':'ア','タ':'ア','ナ':'ア','ハ':'ア','マ':'ア','ヤ':'ア','ラ':'ア','ワ':'ア','ガ':'ア','ザ':'ア','ダ':'ア','バ':'ア','パ':'ア','ァ':'ア','ャ':'ア',
            'イ':'イ','キ':'イ','シ':'イ','チ':'イ','ニ':'イ','ヒ':'イ','ミ':'イ','リ':'イ','ギ':'イ','ジ':'イ','ヂ':'イ','ビ':'イ','ピ':'イ','ィ':'イ',
            'ウ':'ウ','ク':'ウ','ス':'ウ','ツ':'ウ','ヌ':'ウ','フ':'ウ','ム':'ウ','ユ':'ウ','ル':'ウ','グ':'ウ','ズ':'ウ','ブ':'ウ','プ':'ウ','ゥ':'ウ','ュ':'ウ',
            'エ':'エ','ケ':'エ','セ':'エ','テ':'エ','ネ':'エ','ヘ':'エ','メ':'エ','レ':'エ','ゲ':'エ','ゼ':'エ','デ':'エ','ベ':'エ','ペ':'エ','ェ':'エ',
            'オ':'オ','コ':'オ','ソ':'オ','ト':'オ','ノ':'オ','ホ':'オ','モ':'オ','ヨ':'オ','ロ':'オ','ヲ':'オ','ゴ':'オ','ゾ':'オ','ド':'オ','ボ':'オ','ポ':'オ','ォ':'オ','ョ':'オ',
            'ン':'ン'
        };
        let res = "";
        for (let char of kana) { if (table[char]) res += table[char]; }
        return Array.from(new Set(res.split(''))).join(''); // 重複排除
    }

    // 2. 入力支援: オートシンク 
    const nameIn = document.getElementById('newName');
    const rubyIn = document.getElementById('newRuby');

    nameIn.addEventListener('input', () => {
        if (isSyncing) rubyIn.value = nameIn.value;
        updateUI();
    });
    rubyIn.addEventListener('input', () => {
        updateUI();
    });

    function toggleSync() {
        isSyncing = !isSyncing;
        const btn = document.getElementById('syncBtn');
        btn.classList.toggle('active', isSyncing);
        btn.innerText = isSyncing ? "🔗 表示名と読みを連動中" : "🔓 読みを独立入力中";
    }

    function updateUI() {
        const r = rubyIn.value;
        document.getElementById('vPreview').innerText = getVowels(r) || "-";
        document.getElementById('cPreview').innerText = r.length;
    }

    // 4. データ管理: 追加と保存 
    function addWord() {
        const n = nameIn.value.trim();
        const r = rubyIn.value.trim();
        if (!n || !r) return;

        bank.push({ name: n, ruby: r, vowels: getVowels(r), len: r.length });
        save();
        nameIn.value = "";
        rubyIn.value = "";
        updateUI();
        runSearch();
    }

    function save() {
        localStorage.setItem('naruki_lyrics_v8', JSON.stringify(bank));
    }

    // 1. 柔軟なスマート検索 
    function runSearch() {
        const q = document.getElementById('searchIn').value.toLowerCase();
        const listEl = document.getElementById('resultList');
        listEl.innerHTML = "";

        // 文字数順ソート 
        const filtered = bank.map((w, i) => ({...w, id: i}))
            .filter(w => 
                w.name.includes(q) || 
                w.ruby.includes(q) || 
                w.vowels.includes(q) || 
                (q.match(/^\d+$/) && w.len == parseInt(q))
            )
            .sort((a, b) => a.len - b.len);

        filtered.forEach(w => {
            const item = document.createElement('div');
            item.className = 'result-item';
            item.innerHTML = `
                <div class="word-info">
                    <b>${w.name}</b><span class="badge">${w.len}音</span>
                    <small>${w.ruby} [${w.vowels}]</small>
                </div>
                <button class="delete-btn" onclick="del(${w.id})">削除</button>
            `;
            listEl.appendChild(item);
        });
    }

    // 4. 削除ガード 
    function del(idx) {
        if (confirm("この単語を削除しますか？")) {
            bank.splice(idx, 1);
            save();
            runSearch();
        }
    }

    // ファイル管理
    function exportData() {
        const blob = new Blob([JSON.stringify(bank, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'lyrics_v8_backup.json';
        a.click();
    }

    function importData(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                bank = JSON.parse(ev.target.result);
                save();
                runSearch();
                alert("読み込み完了しました");
            } catch(err) { alert("形式が違います"); }
        };
        reader.readAsText(file);
    }

    // 初期起動時
    runSearch();
</script>
</body>
</html>
